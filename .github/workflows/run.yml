name: Update Sub

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run filter
        run: |
          python filter.py

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Commit changes
        run: |
          git add sub.txt mci_best.txt
          git commit -m "auto update" || echo "no changes"

      - name: Sync with remote (IMPORTANT FIX)
        run: |
          git pull --rebase origin main

      - name: Push changes
        run: |
          git push origin main
